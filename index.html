<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel de Atendimentos RH</title>
<link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/1/1a/Logomarca_da_Prefeitura_do_Rio_de_Janeiro_na_vertical_lan%C3%A7ada_em_2025.png">
<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Calibri, Arial, sans-serif;background:#f2f6fc;height:100vh;display:flex;flex-direction:column;}

#loginContainer{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#1e4fa3;
}

.loginBox{
  background:white;
  padding:45px 40px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
  width:420px;
  text-align:center;
}

.loginBox h1{
  margin:0 0 10px;
  color:#1e4fa3;
  font-size:28px;
}

.loginBox p{
  margin:0 0 22px;
  color:#667085;
  font-size:15px;
}

.loginBox input{
  width:100%;
  padding:12px 14px;
  margin-bottom:12px;
  border:1px solid #d0d7e2;
  border-radius:8px;
  font-size:15px;
  outline:none;
}

.loginBox input:focus{
  border-color:#1e4fa3;
}

.loginBtn{
  width:100%;
  border:none;
  background:#1e4fa3;
  color:#fff;
  padding:12px;
  border-radius:8px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
}

.loginBtn:disabled{
  opacity:.7;
  cursor:not-allowed;
}

.infoCarregamento{
  margin-top:10px;
  font-size:13px;
  color:#667085;
}

#painel{
  display:none;
  min-height:100vh;
}

.topbar{
  background:#1e4fa3;
  color:#fff;
  padding:16px 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.topbar h2{
  margin:0;
  font-size:24px;
}

.topRight{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:14px;
  font-weight:700;
}

.topRight button{
  background:#fff;
  color:#1e4fa3;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  font-weight:700;
}

.menu{
  display:flex;
  gap:12px;
  padding:18px 24px 0;
  flex-wrap:wrap;
}

.menu button{
  background:#fff;
  color:#1e4fa3;
  border:1px solid #cdd8ee;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}

.menu button.ativo{
  background:#1e4fa3;
  color:#fff;
  border-color:#1e4fa3;
}

.container{
  padding:24px;
}

.card{
  background:#fff;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  padding:24px;
}

.formGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
  gap:16px;
}

.campo label{
  display:block;
  margin-bottom:6px;
  font-size:14px;
  font-weight:700;
  color:#344054;
}

.campo input, .campo select, .campo textarea{
  width:100%;
  border:1px solid #d0d7e2;
  border-radius:8px;
  padding:11px 12px;
  font-size:14px;
  outline:none;
  font-family:Calibri, Arial, sans-serif;
}

.campo input:focus, .campo select:focus, .campo textarea:focus{
  border-color:#1e4fa3;
}

.campo textarea{
  min-height:100px;
  resize:vertical;
}

.acoes{
  margin-top:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btnPrincipal{
  background:#1e4fa3;
  color:#fff;
  border:none;
  padding:11px 18px;
  border-radius:8px;
  cursor:pointer;
  font-weight:700;
}

.btnPrincipal:disabled{
  opacity:.7;
  cursor:not-allowed;
}

.cardsDash{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
  gap:14px;
  margin-bottom:20px;
}

.cardDash{
  background:#fff;
  border-radius:14px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  border:2px solid transparent;
  cursor:pointer;
  text-align:center;
}

.cardDash.ativo{
  border-color:#1e4fa3;
  box-shadow:0 0 0 3px rgba(30,79,163,0.12);
}

.cardDash h3{
  margin:0 0 10px;
  color:#1e4fa3;
  font-size:16px;
}

.cardDash .num{
  font-size:28px;
  font-weight:700;
  color:#101828;
}

.blocos{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.bloco{
  background:#fff;
  border-radius:14px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.bloco h3{
  margin:0 0 12px;
  color:#1e4fa3;
}

.listaLinhas{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.linhaLista{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 12px;
  border-radius:10px;
  background:#f8faff;
  border:1px solid #dbe6fb;
}

.badgeAzul{
  background:#1e4fa3;
  color:#fff;
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:14px;
}

th, td{
  border-bottom:1px solid #e8eef8;
  padding:10px 8px;
  text-align:left;
  font-size:14px;
}

th{
  color:#1e4fa3;
}

.toast{
  position:fixed;
  top:18px;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  padding:14px 18px;
  border-radius:10px;
  font-weight:700;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
  z-index:9999;
  display:none;
}

@media(max-width:900px){
  .blocos{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="loginContainer">
  <div class="loginBox">
    <h1>Painel de Atendimentos RH</h1>
    <p>Entre com seu usuário e senha</p>

    <input id="usuario" type="text" placeholder="Usuário">
    <input id="senha" type="password" placeholder="Senha">

    <button class="loginBtn" id="btnLogin" onclick="login()">Entrar</button>
    <div class="infoCarregamento" id="statusLogin">Informe usuário e senha.</div>
  </div>
</div>

<div id="painel">
  <div class="topbar">
    <h2>Painel de Atendimentos RH</h2>
    <div class="topRight">
      <span>USUÁRIO: <span id="usuarioLogado"></span></span>
      <button onclick="logout()">SAIR</button>
    </div>
  </div>

  <div class="menu">
    <button id="btnRegistro" class="ativo" onclick="mostrarTela('registro')">Registrar Atendimento</button>
    <button id="btnDashboard" style="display:none;" onclick="mostrarTela('dashboard')">Dashboard</button>
  </div>

  <div class="container">
    <div id="telaRegistro" class="card">
      <div class="formGrid">
        <div class="campo">
          <label>Matrícula</label>
          <input id="matricula" autocomplete="off" oninput="buscarFuncionarioComDelay()" placeholder="Digite a matrícula">
          <div class="infoCarregamento" id="statusBase">Digite a matrícula para consultar.</div>
        </div>

        <div class="campo">
          <label>Nome</label>
          <input id="nome" readonly>
        </div>

        <div class="campo">
          <label>Cargo</label>
          <input id="cargo" readonly>
        </div>

        <div class="campo">
          <label>Tipo de Atendimento</label>
          <select id="tipo">
            <option value="">Selecione</option>
            <option>ACERTO SALARIAL</option>
            <option>CADASTRO</option>
            <option>ATESTADO</option>
            <option>BENEFÍCIOS</option>
            <option>DESLIGAMENTO</option>
            <option>PONTO</option>
            <option>FÉRIAS</option>
            <option>OUTROS</option>
          </select>
        </div>

        <div class="campo" style="grid-column:1/-1;">
          <label>Descrição</label>
          <textarea id="descricao" placeholder="Descreva o atendimento"></textarea>
        </div>
      </div>

      <div class="acoes">
        <button class="btnPrincipal" id="btnRegistrar" onclick="registrar()">Registrar</button>
      </div>
    </div>

    <div id="telaDashboard" style="display:none;">
      <div class="cardsDash">
        <div class="cardDash ativo" id="cardTotal" onclick="aplicarFiltroDashboard('total')">
          <h3>Total</h3>
          <div class="num" id="dashTotal">0</div>
        </div>
        <div class="cardDash" id="cardPendentes" onclick="aplicarFiltroDashboard('pendentes')">
          <h3>Pendentes</h3>
          <div class="num" id="dashPendentes">0</div>
        </div>
      </div>

      <div class="blocos">
        <div class="bloco">
          <h3>Tipos de Atendimento</h3>
          <div id="listaTipos" class="listaLinhas"></div>
        </div>

        <div class="bloco">
          <h3>Ranking de Analistas</h3>
          <div id="listaAnalistas" class="listaLinhas"></div>
        </div>
      </div>

      <div class="bloco" style="margin-top:18px;">
        <h3>Registros</h3>
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Hora</th>
              <th>Matrícula</th>
              <th>Nome</th>
              <th>Cargo</th>
              <th>Tipo</th>
              <th>Descrição</th>
              <th>Analista</th>
            </tr>
          </thead>
          <tbody id="tbodyRegistros"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxq49970v7GV4dNGCXfVqlsvK4FOVYDUVh0_xfgwhzJMntVqzsZX9dgm8-XlD2fvK2euw/exec";

let registros = [];
let usuarioAtual = "";
let perfilAtual = "";
let timerMatricula = null;
let filtroDashboard = "total";

function mostrarNotificacao(msg, cor="#1e4fa3"){
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.style.background = cor;
  toast.style.display = "block";
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => {
    toast.style.display = "none";
  }, 3000);
}

function setStatusLogin(msg){
  document.getElementById("statusLogin").innerText = msg;
}

function setStatusBase(msg){
  document.getElementById("statusBase").innerText = msg;
}

function configurarEnter(){
  document.getElementById("usuario").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
      e.preventDefault();
      document.getElementById("senha").focus();
    }
  });

  document.getElementById("senha").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
      e.preventDefault();
      login();
    }
  });

  document.getElementById("matricula").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
      e.preventDefault();
      document.getElementById("tipo").focus();
    }
  });

  document.getElementById("tipo").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
      e.preventDefault();
      document.getElementById("descricao").focus();
    }
  });

  document.getElementById("descricao").addEventListener("keydown", function(e){
    if(e.key === "Enter" && !e.shiftKey){
      e.preventDefault();
      registrar();
    }
  });
}

function configurarPermissoes(){
  const btnDashboard = document.getElementById("btnDashboard");
  btnDashboard.style.display = perfilAtual === "ADMIN" ? "inline-block" : "none";
}

function restaurarSessao(){
  const usuario = localStorage.getItem("usuarioLogado");
  const perfil = localStorage.getItem("perfilLogado");

  if(usuario){
    usuarioAtual = usuario;
    perfilAtual = (perfil || "USER").toUpperCase();

    document.getElementById("loginContainer").style.display = "none";
    document.getElementById("painel").style.display = "block";
    document.getElementById("usuarioLogado").innerText = usuarioAtual;

    configurarPermissoes();
    mostrarTela("registro");
  }
}

window.onload = function(){
  configurarEnter();
  restaurarSessao();
};

async function login(){
  const u = document.getElementById("usuario").value.trim();
  const s = document.getElementById("senha").value.trim();
  const btn = document.getElementById("btnLogin");

  if(!u || !s){
    mostrarNotificacao("Preencha usuário e senha", "#d93025");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Entrando...";
  setStatusLogin("Validando acesso...");

  try{
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        acao: "login",
        usuario: u,
        senha: s
      })
    });

    const data = await res.json();

    if(data && data.ok){
      usuarioAtual = data.nome || data.usuario || u;
      perfilAtual = (data.perfil || "USER").toUpperCase();

      localStorage.setItem("usuarioLogado", usuarioAtual);
      localStorage.setItem("perfilLogado", perfilAtual);

      document.getElementById("loginContainer").style.display = "none";
      document.getElementById("painel").style.display = "block";
      document.getElementById("usuarioLogado").innerText = usuarioAtual;

      configurarPermissoes();
      mostrarTela("registro");
      setStatusLogin("Acesso liberado.");
    }else{
      mostrarNotificacao((data && data.mensagem) || "Login ou senha inválidos", "#d93025");
      setStatusLogin("Falha no login.");
    }
  }catch(e){
    mostrarNotificacao("Erro ao realizar login", "#d93025");
    setStatusLogin("Erro ao validar login.");
  }

  btn.disabled = false;
  btn.innerText = "Entrar";
}

function buscarFuncionarioComDelay(){
  clearTimeout(timerMatricula);
  timerMatricula = setTimeout(buscarFuncionario, 350);
}

async function buscarFuncionario(){
  const mat = document.getElementById("matricula").value.trim();

  if(!mat){
    document.getElementById("nome").value = "";
    document.getElementById("cargo").value = "";
    setStatusBase("Digite a matrícula para consultar.");
    return;
  }

  try{
    setStatusBase("Consultando matrícula...");

    const res = await fetch(API + "?acao=buscarFuncionario&matricula=" + encodeURIComponent(mat));
    const data = await res.json();

    if(data && data.ok){
      document.getElementById("nome").value = data.nome || "";
      document.getElementById("cargo").value = data.cargo || "";
      setStatusBase("Funcionário localizado.");
    }else{
      document.getElementById("nome").value = "";
      document.getElementById("cargo").value = "";
      setStatusBase("Funcionário não encontrado.");
    }
  }catch(e){
    document.getElementById("nome").value = "";
    document.getElementById("cargo").value = "";
    setStatusBase("Erro ao consultar matrícula.");
  }
}

async function registrar(){
  const matricula = document.getElementById("matricula").value.trim();
  const nome = document.getElementById("nome").value.trim();
  const cargo = document.getElementById("cargo").value.trim();
  const tipo = document.getElementById("tipo").value.trim();
  const descricao = document.getElementById("descricao").value.trim();
  const btn = document.getElementById("btnRegistrar");

  if(!matricula || !nome || !tipo || !descricao){
    mostrarNotificacao("Preencha os campos obrigatórios", "#d93025");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Registrando...";

  try{
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        matricula,
        nome,
        cargo,
        tipo,
        descricao,
        analista: usuarioAtual
      })
    });

    const data = await res.json();

    if(data && data.ok){
      mostrarNotificacao("Atendimento registrado com sucesso.", "#1e4fa3");
      document.getElementById("matricula").value = "";
      document.getElementById("nome").value = "";
      document.getElementById("cargo").value = "";
      document.getElementById("tipo").value = "";
      document.getElementById("descricao").value = "";
      setStatusBase("Digite a matrícula para consultar.");
      document.getElementById("matricula").focus();

      if(document.getElementById("telaDashboard").style.display !== "none"){
        await carregarRegistros();
      }
    }else{
      mostrarNotificacao((data && data.mensagem) || "Erro ao registrar atendimento", "#d93025");
    }
  }catch(e){
    mostrarNotificacao("Erro ao registrar atendimento", "#d93025");
  }

  btn.disabled = false;
  btn.innerText = "Registrar";
}

function logout(){
  localStorage.removeItem("usuarioLogado");
  localStorage.removeItem("perfilLogado");

  usuarioAtual = "";
  perfilAtual = "";
  registros = [];
  filtroDashboard = "total";

  document.getElementById("painel").style.display = "none";
  document.getElementById("loginContainer").style.display = "flex";

  document.getElementById("usuario").value = "";
  document.getElementById("senha").value = "";
  document.getElementById("matricula").value = "";
  document.getElementById("nome").value = "";
  document.getElementById("cargo").value = "";
  document.getElementById("tipo").value = "";
  document.getElementById("descricao").value = "";

  setStatusLogin("Informe usuário e senha.");
  setStatusBase("Digite a matrícula para consultar.");
}

function mostrarTela(tela){
  document.getElementById("telaRegistro").style.display = tela === "registro" ? "block" : "none";
  document.getElementById("telaDashboard").style.display = tela === "dashboard" ? "block" : "none";

  document.getElementById("btnRegistro").classList.toggle("ativo", tela === "registro");
  document.getElementById("btnDashboard").classList.toggle("ativo", tela === "dashboard");

  if(tela === "dashboard"){
    carregarRegistros();
  }
}

async function carregarRegistros(){
  try{
    const res = await fetch(API + "?acao=registros");
    const data = await res.json();
    registros = Array.isArray(data) ? data : [];
    aplicarFiltroDashboard(filtroDashboard);
  }catch(e){
    registros = [];
    aplicarFiltroDashboard("total");
  }
}

function aplicarFiltroDashboard(filtro){
  filtroDashboard = filtro;

  document.getElementById("cardTotal").classList.toggle("ativo", filtro === "total");
  document.getElementById("cardPendentes").classList.toggle("ativo", filtro === "pendentes");

  const total = registros.length;
  document.getElementById("dashTotal").innerText = total;

  const pendentes = registros.filter(r => String(r.STATUS || "").toUpperCase() === "PENDENTE").length;
  document.getElementById("dashPendentes").innerText = pendentes;

  let filtrados = [...registros];

  if(filtro === "pendentes"){
    filtrados = filtrados.filter(r => String(r.STATUS || "").toUpperCase() === "PENDENTE");
  }

  renderTipos(filtrados);
  renderAnalistas(filtrados);
  renderTabela(filtrados);
}

function renderTipos(lista){
  const box = document.getElementById("listaTipos");
  box.innerHTML = "";

  const mapa = {};
  lista.forEach(item => {
    const chave = item.TIPO || "NÃO INFORMADO";
    mapa[chave] = (mapa[chave] || 0) + 1;
  });

  const entradas = Object.entries(mapa).sort((a,b) => b[1] - a[1]);

  if(!entradas.length){
    box.innerHTML = '<div class="linhaLista"><span>Sem dados</span><span class="badgeAzul">0</span></div>';
    return;
  }

  entradas.forEach(([nome, qtd]) => {
    const linha = document.createElement("div");
    linha.className = "linhaLista";
    linha.innerHTML = `<span>${nome}</span><span class="badgeAzul">${qtd}</span>`;
    box.appendChild(linha);
  });
}

function renderAnalistas(lista){
  const box = document.getElementById("listaAnalistas");
  box.innerHTML = "";

  const mapa = {};
  lista.forEach(item => {
    const chave = item.ANALISTA || item.USUARIO || "NÃO INFORMADO";
    mapa[chave] = (mapa[chave] || 0) + 1;
  });

  const entradas = Object.entries(mapa).sort((a,b) => b[1] - a[1]);

  if(!entradas.length){
    box.innerHTML = '<div class="linhaLista"><span>Sem dados</span><span class="badgeAzul">0</span></div>';
    return;
  }

  entradas.forEach(([nome, qtd]) => {
    const linha = document.createElement("div");
    linha.className = "linhaLista";
    linha.innerHTML = `<span>${nome}</span><span class="badgeAzul">${qtd}</span>`;
    box.appendChild(linha);
  });
}

function renderTabela(lista){
  const tbody = document.getElementById("tbodyRegistros");
  tbody.innerHTML = "";

  if(!lista.length){
    tbody.innerHTML = '<tr><td colspan="8">Nenhum registro encontrado.</td></tr>';
    return;
  }

  lista.forEach(item => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item.DATA || ""}</td>
      <td>${item.HORA || ""}</td>
      <td>${item.MATRICULA || item.MATRÍCULA || ""}</td>
      <td>${item.NOME || ""}</td>
      <td>${item.CARGO || ""}</td>
      <td>${item.TIPO || ""}</td>
      <td>${item.DESCRICAO || item.DESCRIÇÃO || ""}</td>
      <td>${item.ANALISTA || item.USUARIO || ""}</td>
    `;
    tbody.appendChild(tr);
  });
}
</script>

</body>
</html>
