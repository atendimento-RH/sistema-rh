<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel de Atendimentos RH</title>

<style>
body{
margin:0;
font-family:Calibri;
background:#f2f6fc;
}

/* LOGIN */
#loginContainer{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.loginBox{
background:white;
padding:50px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
width:350px;
text-align:center;
}

.loginBox h2{
color:#1e4fa3;
margin-top:0;
}

.loginBox input{
width:100%;
padding:12px;
margin-top:12px;
border:1px solid #ccc;
border-radius:6px;
}

.loginBtn{
margin-top:20px;
width:100%;
padding:12px;
background:#1e4fa3;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

#erro{
color:red;
margin-top:10px;
}

/* PAINEL */
#painel{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
position:relative;
}

/* Logo canto superior */
.logo{
position:absolute;
top:20px;
left:20px;
height:60px;
}

/* Usuário logado canto superior direito */
.userInfo{
position:absolute;
top:25px;
right:20px;
color:#1e4fa3;
font-weight:bold;
display:flex;
align-items:center;
gap:10px;
}

/* Título centralizado */
.painelTitulo{
text-align:center;
color:#1e4fa3;
font-size:28px;
font-weight:bold;
margin-top:20px;
margin-bottom:30px;
}

/* Card formulário */
.container{
max-width:900px;
width:100%;
padding:0 20px;
margin-bottom:40px;
}

.card{
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.card h3{
margin-top:0;
color:#1e4fa3;
text-align:center;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
margin-top:5px;
font-family:Calibri;
box-sizing:border-box;
font-size:15px;
}

.botao{
margin-top:25px;
padding:14px;
background:#1e4fa3;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
width:100%;
font-size:15px;
font-weight:bold;
}

.botao:hover{
background:#163a7a;
}
.logoutBtn{
background:#1e4fa3;
border:none;
color:white;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}
</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginContainer">
<div class="loginBox">
<h2>Sistema RH</h2>
<input id="usuario" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">
<button class="loginBtn" onclick="login()">Entrar</button>
<div id="erro"></div>
</div>
</div>

<!-- PAINEL -->

<div id="painel" style="display:none">

<img src="https://i.ibb.co/TMDY0drG/Whats-App-Image-2026-03-13-at-14-14-50.jpg" alt="Logo" class="logo">

<div class="userInfo">
USUÁRIO: <b id="usuarioLogado"></b>
<button class="logoutBtn" onclick="logout()">SAIR</button>
</div>

<div class="painelTitulo">Painel de Atendimentos RH</div>

<div class="container">
<div class="card">
<h3>Registrar Atendimento</h3>

<label>Matrícula *</label> <input id="matricula" oninput="buscarFuncionario()">

<label>Nome</label> <input id="nome" readonly>

<label>Cargo</label> <input id="cargo" readonly>

<label>Tipo de Atendimento *</label> <select id="tipo">

<option value="">-- selecione --</option>
<option>ACERTO SALARIAL</option>
<option>CADASTRO</option>
<option>ATESTADO</option>
<option>BENEFÍCIOS</option>
<option>DESLIGAMENTO</option>
<option>PONTO</option>
<option>FÉRIAS</option>
<option>OUTROS</option>
</select>

<label>Status *</label> <select id="status">

<option value="">-- selecione --</option>
<option>PENDENTE</option>
<option>RESOLVIDO</option>
</select>

<label>Descrição *</label> <input id="descricao">

<button class="botao" id="registrarBtn" onclick="registrar()">Registrar Atendimento</button>

</div>
</div>
</div>

<script>
const URL_USUARIOS="https://opensheet.elk.sh/1SAgl4yBeKAoSrNqC9ZECE4H4JOXaWJuswyH4UEBTFPk/USUARIOS";
const URL_BASE="https://opensheet.elk.sh/1SAgl4yBeKAoSrNqC9ZECE4H4JOXaWJuswyH4UEBTFPk/BASE";
const API_REGISTRO="https://script.google.com/macros/s/AKfycbxq49970v7GV4dNGCXfVqlsvK4FOVYDUVh0_xfgwhzJMntVqzsZX9dgm8-XlD2fvK2euw/exec";

let usuarios=[];
let funcionarios=[];
let usuarioAtual="";

async function carregar(){
    usuarios = await fetch(URL_USUARIOS).then(r=>r.json());
    funcionarios = await fetch(URL_BASE).then(r=>r.json());
}
carregar();

/* manter login ao atualizar */
window.onload=function(){
    let usuarioSalvo=localStorage.getItem("usuarioLogado");
    if(usuarioSalvo){
        usuarioAtual=usuarioSalvo;
        document.getElementById("loginContainer").style.display="none";
        document.getElementById("painel").style.display="block";
        document.getElementById("usuarioLogado").innerText=usuarioAtual;
    }
}

/* LOGIN */
function login(){
    let u=document.getElementById("usuario").value.trim();
    let s=document.getElementById("senha").value.trim();
    let ok=usuarios.find(x=>x.USUARIO==u && x.SENHA==s);
    if(ok){
        usuarioAtual=ok.NOME;
        localStorage.setItem("usuarioLogado",usuarioAtual);
        document.getElementById("loginContainer").style.display="none";
        document.getElementById("painel").style.display="block";
        document.getElementById("usuarioLogado").innerText=usuarioAtual;
    }else{
        document.getElementById("erro").innerText="Usuário ou senha inválidos";
    }
}

/* LOGOUT */
function logout(){
    localStorage.removeItem("usuarioLogado");
    location.reload();
}

/* BUSCAR FUNCIONARIO */
function buscarFuncionario(){
    let mat=document.getElementById("matricula").value;
    let f=funcionarios.find(x=>x.MATRICULA==mat);
    if(f){
        document.getElementById("nome").value=f.NOME;
        document.getElementById("cargo").value=f.CARGO;
    }else{
        document.getElementById("nome").value="";
        document.getElementById("cargo").value="";
    }
}

/* REGISTRAR ATENDIMENTO */
async function registrar(){
    const btn=document.getElementById("registrarBtn");
    btn.disabled=true; // bloqueia botão até concluir
    let mat=document.getElementById("matricula").value;
    let nome=document.getElementById("nome").value;
    let cargo=document.getElementById("cargo").value;
    let tipo=document.getElementById("tipo").value;
    let status=document.getElementById("status").value;
    let desc=document.getElementById("descricao").value;

    if(mat=="" || desc=="" || tipo=="" || status==""){
        alert("Preencha todos os campos obrigatórios");
        btn.disabled=false;
        return;
    }

    let agora=new Date();
    let data=agora.toLocaleDateString();
    let hora=agora.toLocaleTimeString();

    let dados={
        matricula:mat,
        nome:nome,
        cargo:cargo,
        tipo:tipo,
        status:status,
        descricao:desc,
        analista:usuarioAtual,
        data:data,
        hora:hora
    };

    await fetch(API_REGISTRO,{
        method:"POST",
        body:JSON.stringify(dados)
    });

    alert("Atendimento registrado com sucesso!");

    document.getElementById("matricula").value="";
    document.getElementById("nome").value="";
    document.getElementById("cargo").value="";
    document.getElementById("tipo").selectedIndex=0;
    document.getElementById("status").selectedIndex=0;
    document.getElementById("descricao").value="";

    btn.disabled=false; // libera botão novamente
}
</script>

</body>
</html>
