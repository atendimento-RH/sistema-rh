<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel de Atendimentos RH</title>

<style>

body{
margin:0;
font-family:Calibri;
background:#f2f6fc;
}

/* LOGIN */

#loginContainer{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.loginBox{
background:white;
padding:50px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
width:350px;
text-align:center;
}

.loginBox h2{
color:#1e4fa3;
margin-top:0;
}

.loginBox input{
width:100%;
padding:12px;
margin-top:12px;
border:1px solid #ccc;
border-radius:6px;
}

.loginBtn{
margin-top:20px;
width:100%;
padding:12px;
background:#1e4fa3;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

#erro{
color:red;
margin-top:10px;
}

/* TOPO */

.topbar{
background:#1e4fa3;
color:white;
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
}

.logout{
background:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
color:#1e4fa3;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:40px auto;
padding:0 20px;
}

.card{
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

label{
display:block;
margin-top:15px;
}

input,select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
margin-top:5px;
font-family:Calibri;
box-sizing:border-box;
}

.botao{
margin-top:25px;
padding:12px;
background:#1e4fa3;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
width:100%;
}

/* TABELA */

table{
width:100%;
border-collapse:collapse;
margin-top:30px;
}

th{
background:#1e4fa3;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

</style>

</head>

<body>

<div id="loginContainer">

<div class="loginBox">

<h2>Sistema RH</h2>

<input id="usuario" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">

<button class="loginBtn" onclick="login()">Entrar</button>

<div id="erro"></div>

</div>

</div>

<div id="painel" style="display:none">

<div class="topbar">

<h2>Painel de Atendimentos RH</h2>

<div>
Analista: <b id="usuarioLogado"></b>
<button class="logout" onclick="logout()">Sair</button>
</div>

</div>

<div class="container">

<div class="card">

<h3>Registrar Atendimento</h3>

<label>Matrícula *</label> <input id="matricula" oninput="buscarFuncionario()">

<label>Nome</label> <input id="nome" readonly>

<label>Cargo</label> <input id="cargo" readonly>

<label>Tipo de Atendimento</label>

<select id="tipo">
<option>ACERTO SALARIAL</option>
<option>CADASTRO</option>
<option>ATESTADO</option>
<option>BENEFÍCIOS</option>
<option>DESLIGAMENTO</option>
<option>PONTO</option>
<option>FÉRIAS</option>
</select>

<label>Descrição *</label> <input id="descricao">

<button class="botao" onclick="registrar()">Registrar Atendimento</button>

</div>

<div class="card">

<h3>Atendimentos Registrados</h3>

<table id="tabela">

<thead>

<tr>
<th>DATA</th>
<th>HORA</th>
<th>MATRÍCULA</th>
<th>NOME</th>
<th>TIPO</th>
<th>DESCRIÇÃO</th>
<th>ANALISTA</th>
</tr>

</thead>

<tbody id="listaAtendimentos"></tbody>

</table>

</div>

</div>

</div>

<script>

const URL_USUARIOS="https://opensheet.elk.sh/1SAgl4yBeKAoSrNqC9ZECE4H4JOXaWJuswyH4UEBTFPk/USUARIOS";
const URL_BASE="https://opensheet.elk.sh/1SAgl4yBeKAoSrNqC9ZECE4H4JOXaWJuswyH4UEBTFPk/BASE";

const API_REGISTRO="https://script.google.com/macros/s/AKfycbxq49970v7GV4dNGCXfVqlsvK4FOVYDUVh0_xfgwhzJMntVqzsZX9dgm8-XlD2fvK2euw/exec";

let usuarios=[];
let funcionarios=[];
let atendimentos=[];

let usuarioAtual="";

async function carregar(){

usuarios=await fetch(URL_USUARIOS).then(r=>r.json());
funcionarios=await fetch(URL_BASE).then(r=>r.json());

}

carregar();

function login(){

let u=document.getElementById("usuario").value.trim();
let s=document.getElementById("senha").value.trim();

let ok=usuarios.find(x=>x.USUARIO==u && x.SENHA==s);

if(ok){

usuarioAtual=ok.NOME;

document.getElementById("loginContainer").style.display="none";
document.getElementById("painel").style.display="block";

document.getElementById("usuarioLogado").innerText=usuarioAtual;

}else{

document.getElementById("erro").innerText="Usuário ou senha inválidos";

}

}

function logout(){
location.reload();
}

function buscarFuncionario(){

let mat=document.getElementById("matricula").value;

let f=funcionarios.find(x=>x.MATRICULA==mat);

if(f){

document.getElementById("nome").value=f.NOME;
document.getElementById("cargo").value=f.CARGO;

}else{

document.getElementById("nome").value="";
document.getElementById("cargo").value="";

}

}

function adicionarTabela(d){

let tabela=document.getElementById("listaAtendimentos");

let linha=`
<tr>
<td>${d.data}</td>
<td>${d.hora}</td>
<td>${d.matricula}</td>
<td>${d.nome}</td>
<td>${d.tipo}</td>
<td>${d.descricao}</td>
<td>${d.analista}</td>
</tr>
`;

tabela.innerHTML=linha+tabela.innerHTML;

}

async function registrar(){

let mat=document.getElementById("matricula").value;
let nome=document.getElementById("nome").value;
let cargo=document.getElementById("cargo").value;
let tipo=document.getElementById("tipo").value;
let desc=document.getElementById("descricao").value;

if(mat=="" || desc==""){
alert("Matrícula e descrição são obrigatórios");
return;
}

let agora=new Date();

let data=agora.toLocaleDateString();
let hora=agora.toLocaleTimeString();

let dados={
matricula:mat,
nome:nome,
cargo:cargo,
tipo:tipo,
descricao:desc,
analista:usuarioAtual,
data:data,
hora:hora
};

await fetch(API_REGISTRO,{
method:"POST",
body:JSON.stringify(dados)
});

adicionarTabela(dados);

document.getElementById("matricula").value="";
document.getElementById("nome").value="";
document.getElementById("cargo").value="";
document.getElementById("descricao").value="";
document.getElementById("tipo").selectedIndex=0;

}

</script>

</body>
</html>
